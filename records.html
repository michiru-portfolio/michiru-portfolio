<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Records</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/records.css">

</head>

<body>

<header class="page-header">

    <h1>Records</h1>

    <p>Grand Library</p>

</header>

<main>

<section class="records-container">

    <article class="record-card">

        <div class="thumbnail">

            <img src="images/records/portfolio.png"
                 alt="Portfolio Site">

        </div>

        <div class="record-content">

            <h2>📖 Volume I</h2>

            <h3>Portfolio Site</h3>

            <p>
                異世界の館をテーマに制作した
                ポートフォリオサイトです。
            </p>

            <ul class="record-data">

                <li><strong>制作日：</strong>2026年7月</li>

                <li><strong>制作期間：</strong>約2週間</li>

                <li><strong>使用技術：</strong>HTML / CSS / JavaScript</li>

                <li><strong>工夫：</strong>世界観・ページ遷移・アニメーション</li>

            </ul>

            <a

                href="portfolio-site.html"

                class="transition-link open-book"

                data-message="Opening the Record..."

                data-icon="📖"

            >

                📖 本を開く

            </a>

        </div>

    </article>

</section>

<section class="next-page">

    <p>

        制作記録をご覧いただき、
        誠にありがとうございました。

        <br>

        続いて、美術館へご案内いたします。

    </p>

    <a

        href="gallery.html"

        class="transition-link next-btn"

        data-message="Entering the Art Gallery..."

        data-icon="🎨"

    >

        🖼 美術館へ向かう

    </a>

</section>

</main>

<div id="transition-message">

    <div class="transition-content">

        <div class="line"></div>

        <p id="transition-text">

            Loading...

        </p>

        <div id="transition-icon"
             class="book-icon">

            📖

        </div>

        <div class="line"></div>

    </div>

</div>

<script src="js/common.js"></script>
<script src="js/records.js"></script>

</body>

</html>
