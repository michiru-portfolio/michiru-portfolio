<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Reception</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<header class="page-header">

    <h1>Reception</h1>

    <p>
        Thank you for visiting.
    </p>

</header>

<main>

<section class="contact-card">

    <h2>📨 Contact</h2>

    <p>

        ご覧いただき、
        誠にありがとうございました。

        <br><br>

        ご依頼・ご相談などございましたら、
        下記よりお気軽にお問い合わせください。

    </p>

</section>

<section class="link-area">

    <a
        href="https://crowdworks.jp/"
        target="_blank"
        class="contact-link">

        💼 CrowdWorks

    </a>

    <a
        href="https://github.com/あなたのID"
        target="_blank"
        class="contact-link">

        🐙 GitHub

    </a>

    <a
        href="mailto:sample@example.com"
        class="contact-link">

        ✉ Email

    </a>

</section>

<section class="ending">

    <h2>

        Thank you for visiting...

    </h2>

    <p>

        I look forward to working with you.

    </p>

</section>

</main>

</body>

</html>
