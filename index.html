<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michiru's Mansion</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">

</head>
<body>

<div id="header"></div>

<div class="overlay" id="overlay">

    <div class="book" id="book">
        <div class="cover">
            <h1>📖</h1>
            <p>Click to Enter</p>
        </div>
    </div>

</div>

<section class="hero" id="hero">

    <h3>Welcome</h3>

    <h1>ようこそ、お越しくださいました。</h1>

    <p>

        この館では

        Web制作

        プログラミング

        イラスト制作

        をご案内しております。

    </p>

    <a href="profile.html"
    class="transition-link enter-btn"
    data-message="Welcome to the Mansion ..."
    data-icon="🏰"
    >
        館内へ進む

</section>

<div id="transition-message">

    <div class="transition-content">

        <div class="line"></div>

        <p id="transition-text">

            Loading...

        </p>

        <div id="transition-icon" class="book-icon">

            📖

        </div>

        <div class="line"></div>

    </div>

</div>

<div id="footer"></div>

<script src="js/common.js"></script>
