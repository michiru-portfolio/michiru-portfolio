<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <div id="header"></div>

<header class="page-header">

    <h1>Profile</h1>

    <p>
        主人についてご紹介いたします
    </p>

</header>

<main>

<section class="profile-card">

    <div class="profile-image">

        <img
            src="images/character/butler.png"
            alt="執事">

    </div>

    <div class="profile-text">

        <h2>Chiru</h2>

        <p>

            HTML・CSS・JavaScriptを中心に
            Web制作を学習しています。

            「見ていて楽しいサイト」を
            作ることが好きです。

        </p>

    </div>

</section>

<section class="profile-info">

    <div class="info-box">

        <h3>🎨 Hobby</h3>

        <p>

            創作イラスト・キャラクターデザイン

        </p>

    </div>

    <div class="info-box">

        <h3>💻 Learning</h3>

        <p>

            HTML / CSS / JavaScript

        </p>

    </div>

    <div class="info-box">

        <h3>🎯 Goal</h3>

        <p>

            Web制作とイラスト制作の
            両方で活動すること。

        </p>

    </div>

</section>

<section class="next-page">

    <p>

        主人についてご覧いただき、
        誠にありがとうございました。

        <br>

        続いて、制作記録をご案内いたします。

    </p>

    <a

    href="records.html"

    class="transition-link next-btn"

    data-message="Proceeding to the Library..."

    data-icon="📚"

    >

        📖 書庫の扉を開く

    </a>

</section>

</main>

<div id="transition-message">

    <div class="transition-content">

        <div class="line"></div>

        <p id="transition-text">

            Loading...

        </p>

        <div
            id="transition-icon"
            class="book-icon">

            📖

        </div>

        <div class="line"></div>

    </div>

</div>

<div id="footer"></div>

<script src="js/common.js"></script>
<script src="js/profile.js"></script>

</body>

</html>
